server {
    listen 80;
    server_name honeybunny.online www.honeybunny.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl; # managed by Certbot
    server_name honeybunny.online www.honeybunny.online;

    ssl_certificate /etc/letsencrypt/live/honeybunny.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/honeybunny.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    # 1. Point Nginx to the public folder on the host machine
    # IMPORTANT: Update this path to the actual absolute path of your project's 'public' folder on the server
    root /home/hireme/public;

    # 2. Serve static files directly without hitting Docker
    location ~ \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri @proxy;
        expires max;
        access_log off;
    }

    location / {
        try_files $uri @proxy;
    }

    location @proxy {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

}